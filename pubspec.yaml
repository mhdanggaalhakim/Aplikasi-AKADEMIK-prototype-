name: prak2
description: "Aplikasi Data Mahasiswa - Firebase Edition"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.0.0

  # PDF
  pdf: ^3.11.1
  printing: ^5.13.4

  cupertino_icons: ^1.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  
  # Menambahkan konfigurasi folder assets untuk gambar background login
  assets:
    - assets/gedung-upu.jpg